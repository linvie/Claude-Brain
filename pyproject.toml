[project]
name = "claude-brain"
version = "0.1.0"
description = "Notion → Brain daemon → Claude Code 个人异步任务自动化系统"
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0",
    "requests>=2.31",
    "lark-oapi>=1.5",
    "claude-agent-sdk>=0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["brain"]

[project.scripts]
ccbrain = "brain.cli:main"
