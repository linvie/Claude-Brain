[project]
name = "ccbrain"
version = "0.3.8"
description = "Personal AI daemon — Feishu chat + Notion tasks, powered by Claude Code"
requires-python = ">=3.12"
readme = "README.md"
license = {text = "MIT"}
dependencies = [
    "pyyaml>=6.0",
    "requests>=2.31",
    "lark-oapi>=1.5",
    "claude-agent-sdk>=0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["brain"]

[project.scripts]
ccbrain = "brain.cli:main"
