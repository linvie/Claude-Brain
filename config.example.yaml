# Brain Daemon 配置
# 复制为 config.yaml 后填入你的 Notion 数据库 ID

# 轮询间隔
scheduler:
  idle_interval: 1800      # 空闲时轮询间隔（秒），默认 30 分钟
  active_interval: 30      # 有运行中任务时轮询 outbox 间隔（秒）
  cooldown_interval: 120   # 任务完成后的密集轮询间隔（秒），默认 2 分钟
  cooldown_duration: 900   # 密集轮询持续时长（秒），默认 15 分钟
  max_concurrent: 3        # 最大同时运行 CC 进程数

# 任务超时
task:
  max_duration: 7200       # 单任务最大运行时长（秒），默认 2 小时

# Notion 配置（运行 /brain-init 自动填入，或手动配置）
notion:
  token: ""                # Notion Integration Token（ntn_xxx）
  project_db_id: ""        # Project 数据库 ID
  task_db_id: ""           # Task 数据库 ID

# CC 角色权限（通过 CLI --allowedTools / --disallowedTools 硬性控制）
roles:
  planner:
    allowed_tools:
      - Read
      - Write
      - Edit
      - mcp__notion__*
    disallowed_tools:
      - Bash
  executor:
    allowed_tools:
      - Bash
      - Read
      - Write
      - Edit
      - MultiEdit
      - Glob
      - Grep
    disallowed_tools:
      - mcp__notion__*
  tester:
    allowed_tools:
      - Bash
      - Read
      - Write
      - Edit
      - Glob
      - Grep
    disallowed_tools:
      - mcp__notion__*

# 远程开发模式（通过 Tailscale 等组网方案从另一台设备访问）
remote:
  enabled: false                              # 是否启用远程开发模式
  host: "mac-mini.tail1234.ts.net"           # Brain 所在机器的 Tailscale 主机名或 IP
  share_dir: ~/brain-shared                   # 打包产物共享目录

# Workspace 配置
workspace:
  base_dir: ~/brain-workspaces   # workspace 根目录

# 数据库
database:
  path: ./state.db               # SQLite 数据库路径

# 日志
logging:
  level: DEBUG                   # 文件日志级别（控制台固定 INFO）
  dir: ./logs                    # 日志目录，包含：
                                 #   brain.log      — 全量日志
                                 #   scheduler.log  — 任务调度生命周期
                                 #   cc.log         — CC 进程启动/退出/输出
                                 #   notion.log     — Notion API 调用
